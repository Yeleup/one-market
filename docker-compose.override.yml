x-local-php-environment: &local-php-environment
  APP_ENV: local
  APP_DEBUG: ${APP_DEBUG:-true}
  APP_OPTIMIZE: ${APP_OPTIMIZE:-0}
  COMPOSER_HOME: /tmp/composer

x-local-php-service: &local-php-service
  user: '${DOCKER_UID:-1000}:${DOCKER_GID:-1000}'
  environment:
    <<: *local-php-environment
  volumes:
    - .:/var/www/html
    - ./docker/app/php.local.ini:/usr/local/etc/php/conf.d/zz-local.ini:ro

services:
  app:
    build:
      target: app-dev
    <<: *local-php-service
    environment:
      <<: *local-php-environment
      OCTANE_WORKERS: ${OCTANE_WORKERS:-1}
      OCTANE_MAX_REQUESTS: ${OCTANE_MAX_REQUESTS:-1}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-1}

  queue:
    <<: *local-php-service
    command: ['php', 'artisan', 'queue:listen', '--sleep=3', '--tries=3', '--no-interaction']

  scheduler:
    <<: *local-php-service

  db:
    environment:
      MARIADB_TEST_DATABASE: ${MARIADB_TEST_DATABASE:-one_market_testing}
    ports:
      - '${FORWARD_DB_PORT:-3307}:3306'
    volumes:
      - ./docker/db/init:/docker-entrypoint-initdb.d:ro

  vite:
    image: node:22-alpine
    working_dir: /var/www/html
    command:
      - sh
      - -lc
      - npm run dev -- --host 0.0.0.0 --port ${VITE_PORT:-5173}
    environment:
      APP_URL: ${APP_URL:-http://localhost:8000}
      VITE_PORT: ${VITE_PORT:-5173}
      VITE_HMR_HOST: ${VITE_HMR_HOST:-localhost}
      VITE_USE_POLLING: ${VITE_USE_POLLING:-0}
    ports:
      - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - node-modules:/var/www/html/node_modules

volumes:
  node-modules:
