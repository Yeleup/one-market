x-local-php-environment: &local-php-environment
  APP_ENV: local
  APP_DEBUG: ${APP_DEBUG:-true}
  APP_OPTIMIZE: ${APP_OPTIMIZE:-0}

x-local-php-service: &local-php-service
  user: '${DOCKER_UID:-1000}:${DOCKER_GID:-1000}'
  environment:
    <<: *local-php-environment
  volumes:
    - .:/var/www/html
    - vendor:/var/www/html/vendor
    - ./bootstrap/cache:/var/www/html/bootstrap/cache
    - ./storage/app/public:/var/www/html/storage/app/public
    - ./storage/framework/cache:/var/www/html/storage/framework/cache
    - ./storage/framework/sessions:/var/www/html/storage/framework/sessions
    - ./storage/framework/views:/var/www/html/storage/framework/views
    - ./storage/logs:/var/www/html/storage/logs
    - ./docker/app/php.local.ini:/usr/local/etc/php/conf.d/zz-local.ini:ro

services:
  app:
    <<: *local-php-service
    environment:
      <<: *local-php-environment
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-1}

  web:
    volumes:
      - .:/var/www/html:ro
      - ./storage/app/public:/var/www/html/storage/app/public:ro

  queue:
    <<: *local-php-service
    command: ['php', 'artisan', 'queue:listen', '--sleep=3', '--tries=3', '--no-interaction']

  scheduler:
    <<: *local-php-service

  db:
    ports:
      - '${FORWARD_DB_PORT:-3307}:3306'

  vite:
    image: node:22-alpine
    working_dir: /var/www/html
    command:
      - sh
      - -lc
      - |
        [ -x node_modules/.bin/vite ] || npm install --no-package-lock
        npm run dev -- --host 0.0.0.0 --port ${VITE_PORT:-5173}
    environment:
      APP_URL: ${APP_URL:-http://localhost:8000}
      VITE_PORT: ${VITE_PORT:-5173}
      VITE_HMR_HOST: ${VITE_HMR_HOST:-localhost}
      VITE_USE_POLLING: ${VITE_USE_POLLING:-0}
    ports:
      - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'
    restart: unless-stopped
    volumes:
      - .:/var/www/html
      - node-modules:/var/www/html/node_modules

volumes:
  vendor:
  node-modules:
