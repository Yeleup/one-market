x-app-environment: &app-environment
  APP_DEBUG: ${APP_DEBUG:-false}
  APP_ENV: ${APP_ENV:-production}
  APP_KEY: ${APP_KEY:-}
  APP_NAME: ${APP_NAME:-Laravel}
  APP_OPTIMIZE: ${APP_OPTIMIZE:-1}
  APP_URL: ${APP_URL:-http://localhost:8000}
  CACHE_STORE: ${CACHE_STORE:-redis}
  DB_CONNECTION: ${DB_CONNECTION:-mariadb}
  DB_DATABASE: ${DB_DATABASE:-one_market}
  DB_HOST: ${DB_HOST:-db}
  DB_PASSWORD: ${DB_PASSWORD:-laravel}
  DB_PORT: ${DB_PORT:-3306}
  DB_USERNAME: ${DB_USERNAME:-laravel}
  QUEUE_CONNECTION: ${QUEUE_CONNECTION:-redis}
  REDIS_CLIENT: ${REDIS_CLIENT:-phpredis}
  REDIS_HOST: ${REDIS_HOST:-redis}
  REDIS_PASSWORD: ${REDIS_PASSWORD:-null}
  REDIS_PORT: ${REDIS_PORT:-6379}
  SESSION_DRIVER: ${SESSION_DRIVER:-redis}
  WAIT_FOR_DATABASE: ${WAIT_FOR_DATABASE:-1}

x-app-service: &app-service
  environment:
    <<: *app-environment
  depends_on:
    db:
      condition: service_healthy
    redis:
      condition: service_healthy
  restart: unless-stopped
  volumes:
    - ./storage:/var/www/html/storage

services:
  app:
    <<: *app-service
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    image: one-market-app
    ports:
      - '${APP_PORT:-8000}:8000'
    environment:
      <<: *app-environment
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-0}
    healthcheck:
      test: ['CMD', 'docker-healthcheck-http']
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 10s

  queue:
    <<: *app-service
    image: one-market-app
    healthcheck:
      disable: true
    command: ['php', 'artisan', 'queue:work', '--sleep=3', '--tries=3', '--max-time=3600', '--no-interaction']

  scheduler:
    <<: *app-service
    image: one-market-app
    healthcheck:
      disable: true
    command: ['php', 'artisan', 'schedule:work']

  db:
    image: mariadb:11.8
    environment:
      MARIADB_DATABASE: ${DB_DATABASE:-one_market}
      MARIADB_PASSWORD: ${DB_PASSWORD:-laravel}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MARIADB_USER: ${DB_USERNAME:-laravel}
    healthcheck:
      test: ['CMD', 'healthcheck.sh', '--connect', '--innodb_initialized']
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s
    restart: unless-stopped
    volumes:
      - mariadb-data:/var/lib/mysql

  redis:
    image: redis:7.4.8-alpine
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 12
      start_period: 5s
    restart: unless-stopped
    volumes:
      - redis-data:/data

volumes:
  mariadb-data:
  redis-data:
