x-app-environment: &app-environment
  APP_DEBUG: ${APP_DEBUG:-false}
  APP_ENV: ${APP_ENV:-production}
  APP_KEY: ${APP_KEY:-}
  APP_NAME: ${APP_NAME:-Laravel}
  APP_OPTIMIZE: ${APP_OPTIMIZE:-1}
  APP_URL: ${APP_URL:-http://localhost:8000}
  CACHE_STORE: ${CACHE_STORE:-database}
  DB_CONNECTION: ${DB_CONNECTION:-mariadb}
  DB_DATABASE: ${DB_DATABASE:-one_market}
  DB_HOST: ${DB_HOST:-db}
  DB_PASSWORD: ${DB_PASSWORD:-laravel}
  DB_PORT: ${DB_PORT:-3306}
  DB_USERNAME: ${DB_USERNAME:-laravel}
  QUEUE_CONNECTION: ${QUEUE_CONNECTION:-database}
  SESSION_DRIVER: ${SESSION_DRIVER:-database}
  WAIT_FOR_DATABASE: ${WAIT_FOR_DATABASE:-1}

x-app-service: &app-service
  environment:
    <<: *app-environment
  depends_on:
    db:
      condition: service_healthy
  restart: unless-stopped
  volumes:
    - storage-public:/var/www/html/storage/app/public

services:
  app:
    <<: *app-service
    build:
      context: .
      dockerfile: Dockerfile
      target: app
    image: one-market-app
    environment:
      <<: *app-environment
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-0}
    healthcheck:
      test: ['CMD', 'docker-healthcheck-fpm']
      interval: 10s
      timeout: 5s
      retries: 18
      start_period: 10s

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: web
    image: one-market-web
    depends_on:
      app:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -q -O /dev/null http://127.0.0.1/up || exit 1']
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 20s
    ports:
      - '${APP_PORT:-8000}:80'
    restart: unless-stopped
    volumes:
      - storage-public:/var/www/html/storage/app/public:ro

  queue:
    <<: *app-service
    image: one-market-app
    command: ['php', 'artisan', 'queue:work', '--sleep=3', '--tries=3', '--max-time=3600', '--no-interaction']

  scheduler:
    <<: *app-service
    image: one-market-app
    command: ['sh', '-lc', 'while true; do php artisan schedule:run --no-interaction; sleep 60; done']

  db:
    image: mariadb:11.8
    environment:
      MARIADB_DATABASE: ${DB_DATABASE:-one_market}
      MARIADB_PASSWORD: ${DB_PASSWORD:-laravel}
      MARIADB_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-root}
      MARIADB_TEST_DATABASE: ${MARIADB_TEST_DATABASE:-one_market_testing}
      MARIADB_USER: ${DB_USERNAME:-laravel}
    healthcheck:
      test: ['CMD', 'healthcheck.sh', '--connect', '--innodb_initialized']
      interval: 5s
      timeout: 5s
      retries: 12
      start_period: 15s
    restart: unless-stopped
    volumes:
      - ./docker/db/init:/docker-entrypoint-initdb.d:ro
      - mariadb-data:/var/lib/mysql

volumes:
  mariadb-data:
  storage-public:
